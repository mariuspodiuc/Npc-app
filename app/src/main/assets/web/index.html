<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NCP Mechanical</title><link rel="stylesheet" href="style.css"></head><body>
<header><img src="logo.jpg"><div><h1>NCP Mechanical Ltd</h1><p>Waddon Phase 2 • Duppas Hill Road, Croydon, England, CR0 4BG</p></div></header>
<nav><button onclick="show('dash')">Dashboard</button><button onclick="show('variation')">New Variation</button><button onclick="show('qa')">New QA</button><button onclick="show('labour')">Labour Tracker</button><button onclick="show('daily')">Daily Briefing</button></nav>
<main>
<section id="dash" class="page active"><h2>Dashboard</h2><div class="cards"><div><b id="countVar">0</b><span>Variations</span></div><div><b id="sumNet">£0.00</b><span>Net Total</span></div><div><b id="countLab">0</b><span>Labour Entries</span></div></div><h3>Saved Variation Register</h3><table id="varTable"></table><button onclick="exportCSV()">Export CSV</button><button onclick="window.print()">Export / Print PDF</button></section>
<section id="variation" class="page"><h2>Variation Register</h2><form id="varForm"><div class="grid"><label>Job<input name="job" value="Waddon Phase 2"></label><label>Variation No.<input name="number" placeholder="V-001"></label><label>Location<input name="location"></label><label>Date raised<input name="dateRaised" type="date"></label><label>Date required<input name="dateRequired" type="date"></label><label>Status<select name="status"><option>Open</option><option>Submitted</option><option>Approved</option><option>Rejected</option><option>Paid</option></select></label><label>Paid<select name="paid"><option>No</option><option>Yes</option></select></label><label>Raised By<input name="raisedBy"></label><label>Trade / Package<input name="trade" value="Mechanical"></label><label>Reference / RFI / Drawing<input name="reference"></label></div><label>Variation Description<textarea name="description"></textarea></label><h3>Price Items</h3><table><thead><tr><th>Description</th><th>Qty</th><th>Unit</th><th>Rate £</th><th>Added/Deducted</th></tr></thead><tbody id="items"></tbody></table><button type="button" onclick="addItem()">Add price row</button><label>Evidence photos<input name="evidence" type="file" accept="image/*" multiple></label><div class="grid"><label>Requested by<input name="requestedBy"></label><label>Reviewed by<input name="reviewedBy"></label><label>Approved by<input name="approvedBy"></label></div><button type="submit">Save Variation</button></form></section>
<section id="qa" class="page"><h2>New QA</h2><div class="grid"><label>Inspection date<input type="date"></label><label>Inspector<select><option></option><option>Marius Podiuc</option><option>Jamie Dickson</option></select></label><label>Block / Area<input></label><label>Status<select><option>Open</option><option>Passed</option><option>N/A</option><option>Failed</option></select></label></div><label>Comments<textarea></textarea></label><button>Save QA</button></section>
<section id="labour" class="page"><h2>Labour Tracker</h2><form id="labForm"><div class="grid"><label>Date<input name="date" type="date"></label><label>Operative<select name="operative"><option></option><option>Marius Podiuc</option><option>Jamie Dickson</option><option>Operative 1</option><option>Operative 2</option></select></label><label>Trade<input name="trade"></label><label>Hours<input name="hours" type="number" step="0.5"></label></div><button type="submit">Save Labour</button></form><table id="labTable"></table></section>
<section id="daily" class="page"><h2>Daily Start Briefing</h2><div class="grid"><label>Date<input type="date"></label><label>Supervisor<input value="Marius Podiuc"></label><label>Planned activities<input value="Installing pipework, duct fitting, drainage pipework"></label></div><label>Briefing notes<textarea></textarea></label><canvas id="sig" width="700" height="180"></canvas><button onclick="clearSig()">Clear signature</button><button onclick="window.print()">Export PDF</button></section>
</main><script src="app.js"></script></body></html>
